<!DOCTYPE html>
<html>
<head>
    <title>Google Docs</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #87CEEB; }
        #ruffle { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="ruffle"></div>
    <!-- We use the CDN for Ruffle so you don't have to upload the 5MB .wasm file -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById("ruffle").appendChild(player);
            player.load("ducklife.swf");
        });
    </script>
</body>
</html>
