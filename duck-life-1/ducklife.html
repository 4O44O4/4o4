<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Google Docs</title>
    <link rel="icon" href="https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico">
    <style>
        body { margin: 0; background: #00ccff; font-family: 'Arial', sans-serif; text-align: center; color: white; overflow: hidden; user-select: none; }
        canvas { background: #00ccff; display: block; margin: 10px auto; border: 5px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.3); cursor: pointer; }
        .ui { display: flex; justify-content: center; gap: 30px; font-size: 24px; font-weight: bold; text-shadow: 2px 2px #000; margin-top: 10px; }
        #msg { position: absolute; width: 100%; top: 50%; font-size: 40px; display: none; text-shadow: 3px 3px #000; }
    </style>
</head>
<body>
    <div class="ui">
        <div>LEVEL: <span id="lvl">1</span></div>
        <div>COINS: <span id="coins">0</span></div>
    </div>
    <canvas id="g"></canvas>
    <div id="msg">TRAINING OVER!</div>
    <p>Click to Jump over the rocks! <b>Train your duck to level 100!</b></p>

    <script>
        const canvas = document.getElementById("g");
        const ctx = canvas.getContext("2d");
        canvas.width = 800; canvas.height = 400;

        let duck = { x: 100, y: 310, w: 50, h: 50, vy: 0, g: 0.7, jump: -14, anim: 0 };
        let obstacles = [];
        let hills = [0, 400, 800];
        let coins = 0;
        let level = 1;
        let xp = 0;
        let speed = 7;
        let frame = 0;
        let active = true;

        function drawDuck() {
            duck.anim += 0.1;
            let bob = Math.sin(duck.anim) * 3;
            ctx.save();
            ctx.translate(duck.x, duck.y + bob);
            // Original Duck Body
            ctx.fillStyle = "#ffff00";
            ctx.beginPath();
            ctx.ellipse(25, 30, 25, 20, 0, 0, Math.PI * 2); ctx.fill(); // Body
            ctx.beginPath();
            ctx.arc(35, 15, 18, 0, Math.PI * 2); ctx.fill(); // Head
            // Wing
            ctx.fillStyle = "#eeee00";
            ctx.beginPath();
            ctx.ellipse(15, 32, 12, 8, 0.2, 0, Math.PI * 2); ctx.fill();
            // Eye
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(42, 10, 5, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(44, 10, 2, 0, Math.PI * 2); ctx.fill();
            // Beak
            ctx.fillStyle = "#ff9900";
            ctx.beginPath();
            ctx.moveTo(48, 12); ctx.lineTo(65, 18); ctx.lineTo(48, 24); ctx.fill();
            ctx.restore();
        }

        function drawHills() {
            ctx.fillStyle = "#00ee00";
            hills.forEach((h, i) => {
                hills[i] -= speed / 2;
                ctx.beginPath();
                ctx.arc(h + 200, 450, 250, 0, Math.PI * 2);
                ctx.fill();
                if (h < -400) hills[i] = 800;
            });
        }

        function loop() {
            if(!active) return;
            ctx.clearRect(0,0,800,400);
            frame++;

            // Sky is handled by canvas bg
            drawHills();

            // Ground
            ctx.fillStyle = "#996633"; ctx.fillRect(0, 360, 800, 40);
            ctx.fillStyle = "#00dd00"; ctx.fillRect(0, 350, 800, 10);

            // Physics
            duck.vy += duck.g;
            duck.y += duck.vy;
            if (duck.y > 310) { duck.y = 310; duck.vy = 0; }

            // Obstacles
            if (frame % Math.max(30, 90 - (level)) === 0) {
                obstacles.push({ x: 850, y: 320, w: 30, h: 40 });
            }

            obstacles.forEach((o, i) => {
                o.x -= speed;
                // Draw Rock (Original Look)
                ctx.fillStyle = "#777";
                ctx.beginPath();
                ctx.moveTo(o.x, o.y+40); ctx.lineTo(o.x+15, o.y); ctx.lineTo(o.x+30, o.y+40);
                ctx.fill();

                if (duck.x < o.x + o.w && duck.x + 40 > o.x && duck.y < o.y + o.h && duck.y + 40 > o.y) {
                    end();
                }
                if (o.x < -50) {
                    obstacles.splice(i, 1);
                    coins += 5;
                    xp += 10;
                    if(xp >= 100) { xp = 0; level++; speed += 0.2; }
                    document.getElementById('coins').innerText = coins;
                    document.getElementById('lvl').innerText = level;
                }
            });

            drawDuck();
            requestAnimationFrame(loop);
        }

        function end() {
            active = false;
            document.getElementById('msg').style.display = "block";
            setTimeout(() => { location.reload(); }, 2000);
        }

        window.onclick = () => { if (duck.y >= 310) duck.vy = duck.jump; };
        document.addEventListener('keydown', (e) => { 
            if (e.code === "Space" && duck.y >= 310) duck.vy = duck.jump;
            if (e.key === "Escape") window.location.replace("https://classroom.google.com"); 
        });

        loop();
    </script>
</body>
</html>
