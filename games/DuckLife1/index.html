<!DOCTYPE HTML>
<html>
<head>
    <meta charset='utf8'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duck Life - Responsive</title>
    <style>
        /* This makes the container and the player fill the width of your site */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
        }

        #ruffle {
            width: 100%;       /* Fills the width of the parent element */
            max-width: 1000px; /* Optional: prevents it from getting TOO big on huge monitors */
            margin: 0 auto;    /* Centers the game on the page */
            aspect-ratio: 4 / 3; /* Matches the original Duck Life shape */
            background-color: #000;
        }

        /* Forces the Ruffle player inside the div to be responsive */
        ruffle-player {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
    </style>
</head>
<body>
    
    <div id='ruffle'></div>

    <script src='./ruffle.js'></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        
        var swfobject = {};
        swfobject.embedSWF = function(url, cont) {
            var ruffle = window.RufflePlayer.newest(),
                player = ruffle.createPlayer();
            
            document.getElementById(cont).appendChild(player);
            
            // We removed the fixed width/height numbers here 
            // so the CSS above can take total control.
            player.load({ url: url });
            
            // Ad-blocker: Kill any external ad calls the SWF tries to make
            window.PokiSDK = { init: () => Promise.resolve(), ads: { breakCheck: () => Promise.resolve() } };
        }

        // Just provide the file and the div ID. The CSS handles the "Fit".
        swfobject.embedSWF('./duck-life.swf', 'ruffle');
    </script>
</body>
</html>
