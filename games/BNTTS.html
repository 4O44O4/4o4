    <style>
        body { background-color: #000; margin: 0; overflow: hidden; }
        #ads, .ad-unit, #poki-sdk-container { display: none !important; }
    </style>

    <script>
        // FAKE AD SIGNAL (Mocking the SDK)
        // This tells the game "Ads are finished" before they even try to load
        window.adConfig = function(o) { return; };
        window.PokiSDK = {
            init: function() { return Promise.resolve(); },
            ads: {
                breakCheck: function() { return Promise.resolve(); },
                adFinished: function() { return true; }
            },
            setDebug: function() { return; },
            gameLoadingStart: function() { return; },
            gameLoadingFinished: function() { return; }
        };

        // Mocking Google Tag Manager to prevent errors
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
    </script>
</head>
