<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tag - Fullscreen</title>
    <style>
        /* This removes all white space and scrollbars from the browser */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* This forces the game to be exactly the size of the window */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://abinbins.github.io/a3/tag" 
        allow="autoplay; fullscreen; keyboard" 
        id="game-area">
    </iframe>

</body>
</html>
