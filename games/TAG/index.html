<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Research Project</title> 
    <style>
        body, html { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            overflow: hidden; background: #000; 
        }
        #container, #game-frame { 
            width: 100%; height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>

<div id="container"></div>

<script>
    // The actual game source
    const target = "https://abinbins.github.io/a3/tag/";

    // Optimized Blob content focused strictly on the game
    const blobCode = `
        <!DOCTYPE html>
        <html>
            <head>
                <style>
                    body, html { 
                        margin:0; padding:0; 
                        height:100%; width:100%; 
                        overflow:hidden; background:#000; 
                    }
                    iframe { 
                        width:100%; height:100%; 
                        border:none; 
                    }
                </style>
            </head>
            <body>
                <iframe src="${target}" allow="autoplay; fullscreen; keyboard"></iframe>
            </body>
        </html>
    `;

    // Create the memory-only file (Blob)
    const blob = new Blob([blobCode], { type: 'text/html' });
    const blobURL = URL.createObjectURL(blob);

    // Inject the stealth iframe
    const iframe = document.createElement('iframe');
    iframe.id = "game-frame";
    iframe.src = blobURL;
    
    // Pass through permissions for the game engine
    iframe.setAttribute("allow", "autoplay; fullscreen; keyboard");
    
    document.getElementById('container').appendChild(iframe);
</script>

</body>
</html>
