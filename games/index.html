<!DOCTYPE html>
<html>

<head>
	<title>Giant Hamster Run</title>

	<meta http-equiv="Content-type" content="text/html; charset=utf-8">
	<meta name="viewport" content="initial-scale=1.0001, minimum-scale=1.0001, maximum-scale=1.0001, user-scalable=no, minimal-ui" />
	<meta name="apple-mobile-web-app-capable" content="yes" />

	<link rel="stylesheet" type="text/css" href="game.css">
	<script type="text/javascript" src="game.js"></script>
	<script>
        window.splashBackground = "#333399";
    </script>
	
	

	<!-- AnalyticsCode -->
	<!-- APICode -->
	

</head>

<body onload="setTimeout(window.scrollTo(0,1),1);">
	
	<script>
   document.addEventListener('touchstart', function(e) {
    	e.preventDefault();
    }, { passive: false });
	
    document.addEventListener('touchmove', function(e) {
    	e.preventDefault();
    }, { passive: false }); 

    document.addEventListener("contextmenu", function (e) {
    	e.preventDefault();
    }, false);

            window.addEventListener("keydown", function(e)
            {
                if(["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].indexOf(e.code) > -1)
                {
                    e.preventDefault();
                }
            }, false);
	   </script>
	
	<div id="ajaxbar">
		<div id="game"><canvas id="canvas"></canvas></div>

		<div id="orientate"><img src="media/graphics/orientate/landscape.jpg" /></div>
		<div id="play" class="play" onclick=""></div>

	</div>
	
	

</body>

</html>
