<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tube Jumpers | Project 404</title>
    
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;">

    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; 
            display: flex; justify-content: center; align-items: center;
        }
        #player-container { width: 100vw; height: 100vh; }
        ruffle-player { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="player-container"></div>

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("player-container");
            container.appendChild(player);
            
            // Loading Tube Jumpers from a high-uptime repository
            player.load({
                url: "https://raw.githubusercontent.com/skid-inc/flash-games/main/tube-jumpers.swf",
                allowScriptAccess: true,
            }).then(() => {
                console.log("Tube Jumpers Ready");
            }).catch((e) => {
                console.error("Load Error:", e);
                // Fallback link if the first one fails
                player.load("https://cdn.jsdelivr.net/gh/688/files@main/tube-jumpers.swf");
            });
        });

        // --- PANIC INTEGRATION (Shift + 1) ---
        window.addEventListener('keydown', (e) => {
            if (e.shiftKey && e.key === '1') {
                window.top.location.href = "https://classroom.google.com";
            }
        });
    </script>

</body>
</html>
