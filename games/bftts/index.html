<!DOCTYPE html>
<html>
  <head>
    <title>big flappy tower tiny square - Fullscreen</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      .game-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
      }

      .game-container iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
    </style>
  </head>

  <body>
    <div class="game-container" id="gameContainer"></div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        function embedGame(gamePath) {
          var iframe = document.createElement("iframe");
          iframe.src = gamePath;
          iframe.allowFullscreen = true;

          document.getElementById("gameContainer").appendChild(iframe);
        }

        embedGame("./game/index.html");
      });
    </script>
  </body>
</html>
