<!DOCTYPE html>
<html>
<head>
    <title>Capybara Clicker Lite</title>
    <style>
        body { background: #2c3e50; color: white; text-align: center; font-family: sans-serif; }
        #capy { width: 200px; cursor: pointer; transition: transform 0.1s; border-radius: 50%; }
        #capy:active { transform: scale(0.9); }
        .stats { font-size: 24px; margin: 20px; }
        button { padding: 10px; font-size: 16px; cursor: pointer; background: #e67e22; border: none; color: white; border-radius: 5px; }
        button:disabled { background: #7f8c8d; }
    </style>
</head>
<body>
    <div class="stats">Capybaras: <span id="score">0</span></div>
    <img id="capy" src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/34/Capybara_Agriculture.jpg/320px-Capybara_Agriculture.jpg" alt="Capybara">
    <br><br>
    <button id="upgrade" onclick="buyUpgrade()">Buy Auto-Clicker (Cost: 10)</button>

    <script>
        let score = 0;
        let autoClicks = 0;
        let upgradeCost = 10;

        const scoreEl = document.getElementById('score');
        const capyEl = document.getElementById('capy');
        const upgradeBtn = document.getElementById('upgrade');

        capyEl.onclick = () => {
            score++;
            updateDisplay();
        };

        function buyUpgrade() {
            if (score >= upgradeCost) {
                score -= upgradeCost;
                autoClicks++;
                upgradeCost = Math.round(upgradeCost * 1.5);
                updateDisplay();
            }
        }

        function updateDisplay() {
            scoreEl.innerText = score;
            upgradeBtn.innerText = `Buy Auto-Clicker (Cost: ${upgradeCost})`;
            upgradeBtn.disabled = score < upgradeCost;
        }

        // The "Engine" - runs every second
        setInterval(() => {
            score += autoClicks;
            updateDisplay();
        }, 1000);
    </script>
</body>
</html>
