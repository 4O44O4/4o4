<!DOCTYPE html>
<html manifest="offline.appcache">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>Big Tower Tiny Square - Gravity Edition</title>
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="apple-touch-icon" sizes="256x256" href="icon-256.png" />
    <meta name="HandheldFriendly" content="true" />
    <meta name="mobile-web-app-capable" content="yes" />

    <style type="text/css">
        * { padding: 0; margin: 0; }
        html, body { background: #000; color: #fff; overflow: hidden; touch-action: none; -ms-touch-action: none; }
        canvas { touch-action-none; -ms-touch-action: none; }
        #c2canvasdiv { display: flex; align-items: center; justify-content: center; width: 100vw; height: 100vh; }
    </style>
</head> 
 
<body> 
    <div id="fb-root"></div>
	
    <div id="c2canvasdiv">
        <canvas id="c2canvas" width="1920" height="1080">
            <h1>Your browser does not support HTML5.</h1>
        </canvas>
    </div>
    
    <script src="jquery-2.1.1.min.js"></script>

    <script src="c2runtime.js"></script>

    <script src="js/main.js"></script>

    <script>
        // This starts the Construct 2 engine
        jQuery(document).ready(function () {
            cr_createRuntime("c2canvas");
        });

        // This ensures the game stays focused so keys work
        window.addEventListener("keydown", function(e) {
            if([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) {
                e.preventDefault();
            }
        }, false);
    </script>
</body> 
</html>
